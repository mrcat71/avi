name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: build + test
    runs-on: macos-26
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Cache SwiftPM
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6 # renovate will pin this to a SHA on first run
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
          key: spm-${{ runner.os }}-${{ hashFiles('**/Package.resolved', 'Package.swift') }}
          restore-keys: |
            spm-${{ runner.os }}-
      - name: Swift toolchain
        run: swift --version
      - name: Build
        run: swift build
      - name: Test
        run: swift test

  lint:
    name: lint
    runs-on: macos-26
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Install SwiftFormat
        run: brew install --quiet swiftformat
      - name: SwiftFormat lint
        run: swiftformat --lint .

  bundle-smoke:
    name: bundle smoke
    runs-on: macos-26
    needs: build-test
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Cache SwiftPM
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6 # renovate will pin this to a SHA on first run
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
          key: spm-${{ runner.os }}-${{ hashFiles('**/Package.resolved', 'Package.swift') }}
          restore-keys: |
            spm-${{ runner.os }}-
      - name: Release build
        run: swift build -c release
      - name: Version
        run: .build/release/AviApp --version
      - name: Self-test
        run: .build/release/AviApp --self-test
