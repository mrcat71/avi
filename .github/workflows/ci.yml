name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: build + test
    runs-on: macos-15
    steps:
      - name: Check out
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Cache SwiftPM
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4 # renovate will pin this to a SHA on first run
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
          key: spm-${{ runner.os }}-${{ hashFiles('**/Package.resolved', 'Package.swift') }}
          restore-keys: |
            spm-${{ runner.os }}-
      - name: Swift toolchain
        run: swift --version
      - name: Build
        run: swift build
      - name: Test
        run: swift test

  lint:
    name: lint
    runs-on: macos-15
    steps:
      - name: Check out
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Install SwiftFormat
        run: brew install --quiet swiftformat
      - name: SwiftFormat lint
        run: swiftformat --lint .

  bundle-smoke:
    name: bundle smoke
    runs-on: macos-15
    needs: build-test
    steps:
      - name: Check out
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Cache SwiftPM
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4 # renovate will pin this to a SHA on first run
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
          key: spm-${{ runner.os }}-${{ hashFiles('**/Package.resolved', 'Package.swift') }}
          restore-keys: |
            spm-${{ runner.os }}-
      - name: Release build
        run: swift build -c release
      - name: Version
        run: .build/release/AviApp --version
      - name: Self-test
        run: .build/release/AviApp --self-test
